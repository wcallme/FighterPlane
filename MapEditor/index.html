<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FighterPlane Map Editor</title>
    <link rel="stylesheet" href="editor.css">
</head>
<body>
    <!-- Toolbar -->
    <div id="toolbar">
        <button class="tool-btn active" data-tool="raise" title="Raise terrain (1)">▲ Raise</button>
        <button class="tool-btn" data-tool="lower" title="Lower terrain (2)">▼ Lower</button>
        <button class="tool-btn" data-tool="smooth" title="Smooth terrain (3)">≈ Smooth</button>
        <div class="separator"></div>
        <button class="tool-btn" data-tool="tree" title="Place trees (4)">🌲 Tree</button>
        <button class="tool-btn" data-tool="rock" title="Place rocks (5)">🪨 Rock</button>
        <button class="tool-btn" data-tool="enemy" title="Place enemies (6)">⚔ Enemy</button>
        <button class="tool-btn" data-tool="plane" title="Place plane triggers (7)">✈ Plane</button>
        <button class="tool-btn" data-tool="building" title="Place buildings (8)">🏢 Building</button>
        <button class="tool-btn" data-tool="road" title="Paint roads (0)">🛣 Road</button>
        <div class="separator"></div>
        <button class="tool-btn" data-tool="eraser" title="Erase objects (9)">✕ Eraser</button>
        <div class="separator"></div>
        <label>Brush</label>
        <button class="tool-btn brush-shape-btn active" data-shape="circle" title="Circle brush (soft falloff)">&#9679;</button>
        <button class="tool-btn brush-shape-btn" data-shape="square" title="Square brush (uniform)">&#9632;</button>
        <button class="tool-btn brush-shape-btn" data-shape="diamond" title="Diamond brush (uniform)">&#9670;</button>
        <div class="separator"></div>
        <label>Size</label>
        <input type="range" id="brushSize" min="1" max="15" value="3">
        <span class="range-val" id="brushSizeVal">3</span>
        <label>Strength</label>
        <input type="range" id="brushStrength" min="1" max="20" value="5">
        <span class="range-val" id="brushStrengthVal">0.5</span>
    </div>

    <!-- Main content -->
    <div id="main">
        <div id="canvas-wrap">
            <canvas id="mapCanvas"></canvas>
        </div>

        <!-- Properties Panel -->
        <div id="panel">
            <div class="section">
                <h3>Map</h3>
                <label>Name</label>
                <input type="text" id="mapName" value="Untitled Mission">
                <label>Map Length (game units)</label>
                <div style="display:flex;align-items:center;gap:6px;">
                    <input type="range" id="mapLength" min="100" max="3000" step="50" value="500" style="flex:1;">
                    <input type="number" id="mapLengthNum" min="100" max="3000" step="50" value="500" style="width:60px;">
                </div>
                <label>Size: <span id="mapDimensions"></span></label>
            </div>

            <div class="section">
                <h3>Terrain Type</h3>
                <select id="terrainType">
                    <option value="temperate">Temperate</option>
                    <option value="snow">Arctic</option>
                    <option value="desert">Desert</option>
                    <option value="rocky">Volcanic</option>
                </select>
            </div>

            <div class="section">
                <h3>Water Level</h3>
                <input type="range" id="waterLevel" min="-3" max="3" step="0.1" value="-0.2">
                <span class="range-val" id="waterLevelVal">-0.2</span>
            </div>

            <div class="section" id="enemyPanel" style="display:none">
                <h3>Enemy Type</h3>
                <div class="enemy-type-grid">
                    <button class="enemy-type-btn active" data-enemy="tank">Tank</button>
                    <button class="enemy-type-btn" data-enemy="aaGun">AA Gun</button>
                    <button class="enemy-type-btn" data-enemy="samLauncher">SAM Turret</button>
                    <button class="enemy-type-btn" data-enemy="truck">Truck</button>
                    <button class="enemy-type-btn" data-enemy="radioTower">Radio Tower</button>
                    <button class="enemy-type-btn" data-enemy="building">Building</button>
                </div>
            </div>

            <div class="section" id="buildingPanel" style="display:none">
                <h3>Building Type</h3>
                <div class="enemy-type-grid">
                    <button class="building-type-btn active" data-building="house">House</button>
                    <button class="building-type-btn" data-building="office">Office</button>
                    <button class="building-type-btn" data-building="skyscraper">Skyscraper</button>
                    <button class="building-type-btn" data-building="warehouse">Warehouse</button>
                    <button class="building-type-btn" data-building="tower">Tower</button>
                </div>
                <label>Rotation</label>
                <div style="display:flex;align-items:center;gap:6px;">
                    <input type="range" id="buildingRotation" min="0" max="270" step="90" value="0" style="flex:1;">
                    <span class="range-val" id="buildingRotationVal">0°</span>
                </div>
            </div>

            <div class="section" id="planePanel" style="display:none">
                <h3>Enemy Plane</h3>
                <div class="enemy-type-grid">
                    <button class="plane-type-btn active" data-plane="fighter">Dumb Fighter</button>
                    <button class="plane-type-btn" data-plane="aiFighter">AI Fighter</button>
                </div>
                <label>Group Size</label>
                <div style="display:flex;align-items:center;gap:6px;">
                    <input type="range" id="planeCount" min="1" max="4" value="1" style="flex:1;">
                    <span class="range-val" id="planeCountVal">1</span>
                </div>
                <p style="font-size:11px;color:#888;margin:4px 0 0;">Click = encounter point. Planes spawn further ahead.</p>
            </div>

            <div class="section" id="objectInfo">
                <h3>Selection</h3>
                <div id="selectionInfo" style="font-size:12px;color:#888;">No selection</div>
            </div>

            <div class="section">
                <h3>Actions</h3>
                <button class="success" onclick="editor.saveToLocalStorage(); window.location.href='missions.html'">Back to Missions</button>
                <button class="primary" onclick="editor.saveToLocalStorage()">Save Mission</button>
                <button onclick="editor.generateTerrain()">Generate Terrain</button>
                <button onclick="editor.flattenAll()">Flatten All</button>
                <button onclick="editor.clearMap()">Clear Map</button>
                <button onclick="editor.exportJSON()">Export JSON</button>
                <button onclick="document.getElementById('importFile').click()">Import JSON</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="editor.importJSON(event)">
                <button onclick="editor.newMap()">New Map</button>
            </div>

            <div class="section">
                <h3>View</h3>
                <label><input type="checkbox" id="showGrid" checked> Show Grid</label><br>
                <label><input type="checkbox" id="showObjects" checked> Show Objects</label>
            </div>

            <div class="section">
                <h3>Counts</h3>
                <div id="objectCounts" style="font-size:12px;color:#888;"></div>
            </div>
        </div>
    </div>

    <!-- Status bar -->
    <div id="status">
        <span id="cursorPos">X: - Z: -</span>
        <span id="cursorHeight">Height: -</span>
        <span id="zoomLevel">Zoom: 4x</span>
        <span style="display:inline-flex;align-items:center;gap:4px;">Rotate <input type="range" id="rotationSlider" min="0" max="360" value="0" style="width:120px;accent-color:#e94560;"> <span id="rotationVal" class="range-val">0°</span></span>
        <span>Ctrl+Z: Undo</span>
    </div>

    <!-- Undo toast -->
    <div class="undo-toast" id="undoToast">Undo</div>

    <script src="editor.js"></script>
</body>
</html>
