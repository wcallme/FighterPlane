name: FighterPlane
options:
  bundleIdPrefix: com.fighterplane
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.2"

targets:
  FighterPlane:
    type: application
    platform: iOS
    sources:
      - FighterPlane
    settings:
      base:
        INFOPLIST_FILE: FighterPlane/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.fighterplane.game
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_KEY_UILaunchScreen_Generation: true
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
